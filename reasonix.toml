[permissions]
allow = ["Bash(git remote -v 2>&1)", "Bash(git log --oneline -5 2>&1)", "Bash(Get-ChildItem -Force | Select-Object Name, Mode, Length 2>&1)", "Bash(Get-ChildItem '项目部署' -Name 2>&1)", "Bash(git init 2>&1)", "Bash(git config user.name 2>&1; git config user.email 2>&1)", "Edit", "Bash(git add -A 2>&1)", "Bash(git status 2>&1)", "Bash(git commit -m 'Initial commit: project deployment and development docs' 2>&1)", "Bash(git remote add origin https://github.com/whitexyc/daily.git 2>&1)", "Bash(git push -u origin main 2>&1)", "Bash(git pull origin main --allow-unrelated-histories 2>&1)", "Bash(Get-ChildItem -Recurse -File | Where-Object { $_.Length -gt 100MB } | Select-Object Name, @{Name=\"SizeMB\";Expression={[math]::Round($_.Length/1MB,1)}} 2>&1)", "Bash(Get-ChildItem -Recurse -File | Where-Object { $_.Length -gt 50MB -and $_.Length -le 100MB } | Select-Object Name, @{Name=\"SizeMB\";Expression={[math]::Round($_.Length/1MB,1)}} 2>&1)", "Bash(git config http.postBuffer 524288000 2>&1)", "Bash(git config http.version HTTP/1.1 2>&1)", "Bash(git show --stat HEAD 2>&1 | Select-String \"jar\")"]

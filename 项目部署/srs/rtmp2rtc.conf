# ============================================================================
# SRS 配置文件 (支持 HTTPS)
# 内网 IP：10.168.89.202
# ============================================================================

# ==================== 全局基本设置 ====================
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

# ==================== HTTP API (仅HTTP) ====================
http_api {
    enabled         on;
    listen          1985;
    https {
        enabled     on;
        listen      1986;           # API HTTPS 端口
        key         /usr/local/srs/conf/ssl/server.key;
        cert        /usr/local/srs/conf/ssl/server.crt;
    }
}

# ==================== HTTP 静态服务器 (支持 HTTPS) ====================
http_server {
    enabled         on;
    listen          8080;           # HTTP 端口
    # 使用 https {} 子块配置 HTTPS
    https {
        enabled     on;
        listen      8088;           # HTTPS 端口
        key         /usr/local/srs/conf/ssl/server.key;   # 私钥文件路径
        cert        /usr/local/srs/conf/ssl/server.crt;   # 证书文件路径
    }
    dir             ./objs/nginx/html;
}

# ==================== WebRTC 服务器配置 ====================
rtc_server {
    enabled         on;
    listen          8000;
    # 告诉 SRS，外界连过来的 UDP 端口是 8003，而不是 8000
    candidate       10.168.89.202:8003;
    protocol        udp;
}

# ==================== 虚拟主机配置 ====================
vhost __defaultVhost__ {
    rtc {
        enabled     on;
        rtmp_to_rtc on;
        rtc_to_rtmp on;
        nack        on;
        twcc        on;
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}